name: qibla
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  # for adapting screen, font size and responsive design.
  responsive_framework: ^1.5.1
  flutter_screenutil: ^5.9.3
  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  hydrated_bloc: ^10.1.1
  path_provider: ^2.1.5
  # Dependency Injection
  get_it: ^9.0.5
  # Automatically generate code for converting to and from JSON by annotating Dart classes
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^7.0.0
  dio_smart_retry: ^7.0.1
  retrofit: ^4.9.0
  # Functional Programming
  dartz: ^0.10.1
  rxdart: ^0.28.0
  equatable: ^2.0.5
  # provides API to store data in secure storage.
  flutter_secure_storage: ^9.2.4
  easy_localization: ^3.0.8
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.0.5
  smooth_page_indicator: ^1.2.1
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.2
  device_preview: ^1.3.1
  url_launcher: ^6.3.2
  just_audio: ^0.10.5
  photo_view: ^0.15.0
  animations: ^2.1.1
  firebase_messaging: ^16.2.0
  package_info_plus: ^8.3.1
  in_app_review: ^2.0.11
  permission_handler: ^12.0.1
  geolocator: ^10.1.0
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  audioplayers: ^6.6.0
  audio_service: ^0.18.18
  qcf_quran_plus: ^0.0.7
  page_flip: ^0.2.5+1
  quick_actions: ^1.1.0
  flutter_local_notifications: ^21.0.0
  intl: ^0.20.2



dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/images/app_icon.png"

flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/json/quran.json
    - assets/quran_master/audio/
    - assets/quran_master/surah/
    - assets/quran_master/translation/ar/


  fonts:
    - family: AlMushafQuran
      fonts:
        - asset: assets/fonts/Al Mushaf Quran.ttf
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #

